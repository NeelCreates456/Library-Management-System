{% extends "base.html" %}

{% block content %}

<div style="margin-top:120px;"></div>

<div class="fine-container">

<div class="fine-card">

<h1>📚 Library Fine</h1>

{% if fine == 0 %}

<h2 class="no-fine">🟢 No Fine</h2>
<p>You returned the book on time 🎉</p>

{% else %}

<h2 class="fine-amount">⚠ Fine Amount: ₹{{ fine }}</h2>
<p>Please pay the fine at the library desk.</p>

{% endif %}

</div>

</div>

{% endblock %}
